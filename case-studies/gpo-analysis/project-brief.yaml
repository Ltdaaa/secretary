project:
  name: "gpo-analysis"
  goal: "Analyze the local GPO computer vision project as an AI company delivery case."
  domain: "AI product company, model training, evaluation, and operations"
  deadline: "hackathon demo"

company_positioning:
  company_type: "Fortune-500-style AI technology company"
  operating_model: "Executive command + product/market + AI R&D platform + delivery/story"
  default_offer: "AI model product designed, evaluated, launched, and operated by a multi-agent company team"

constraints:
  compute: "CPU-first demo; GPU training optional"
  budget: "low-cost reproducible baseline first"
  privacy: "no private or sensitive data without explicit approval"
  deployment: "Skill and markdown delivery package first"

success_metrics:
  business:
    - "Judge understands company-level value in under 3 minutes"
    - "Pipeline shows market, product, data, model, operations, and final deliverables"
  technical:
    - "Product requirements, data card, model matrix, training plan, fine-tune plan, MLOps plan, and evaluation protocol exist"
    - "At least one baseline route is defined before fine-tuning"
  operations:
    - "Launch, onboarding, analytics, support, and feedback loop exist"
  safety:
    - "Risk register and legal review include privacy, copyright, bias, misuse, and overclaiming checks"

